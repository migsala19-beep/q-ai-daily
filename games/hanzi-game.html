<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小宝贝认字大冒险 🌟</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}

.game-container {
  background: rgba(255,255,255,0.95);
  border-radius: 30px;
  padding: 30px 20px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  text-align: center;
}

.header {
  margin-bottom: 20px;
}

.header h1 {
  font-size: 28px;
  color: #764ba2;
  margin-bottom: 10px;
}

.score-bar {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
  font-size: 18px;
  color: #555;
}

.score-bar .stars {
  color: #ffc107;
  font-size: 22px;
}

.hanzi-display {
  font-size: 120px;
  color: #333;
  margin: 20px 0;
  line-height: 1.2;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
  min-height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.voice-btn {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  font-size: 30px;
  cursor: pointer;
  margin: 10px auto 20px;
  box-shadow: 0 5px 15px rgba(102,126,234,0.4);
  transition: transform 0.2s;
}
.voice-btn:active { transform: scale(0.9); }

.hint-text {
  font-size: 20px;
  color: #666;
  margin-bottom: 15px;
}

.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 10px;
}

.option-btn {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
  border: none;
  padding: 20px 15px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 5px 15px rgba(245,87,108,0.3);
  min-height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.option-btn:nth-child(2) { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); box-shadow: 0 5px 15px rgba(79,172,254,0.3); }
.option-btn:nth-child(3) { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); box-shadow: 0 5px 15px rgba(67,233,123,0.3); }
.option-btn:nth-child(4) { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); box-shadow: 0 5px 15px rgba(250,112,154,0.3); }

.option-btn:active { transform: scale(0.95); }
.option-btn.correct { animation: correctAnim 0.6s ease; background: linear-gradient(135deg, #43e97b, #38f9d7) !important; }
.option-btn.wrong { animation: wrongAnim 0.6s ease; background: linear-gradient(135deg, #ff5858, #f09819) !important; }

@keyframes correctAnim {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

@keyframes wrongAnim {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-10px); }
  40%, 80% { transform: translateX(10px); }
}

.celebration {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1000;
}

.particle {
  position: absolute;
  font-size: 30px;
  animation: fall 2s ease-out forwards;
}

@keyframes fall {
  0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.start-screen, .end-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  color: white;
  text-align: center;
  padding: 20px;
}

.start-screen h1 {
  font-size: 42px;
  margin-bottom: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.start-screen p {
  font-size: 20px;
  margin-bottom: 40px;
  opacity: 0.9;
}

.start-btn, .restart-btn {
  background: white;
  color: #764ba2;
  border: none;
  padding: 18px 50px;
  font-size: 24px;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition: transform 0.2s;
}
.start-btn:active, .restart-btn:active { transform: scale(0.95); }

.end-screen h2 {
  font-size: 36px;
  margin-bottom: 20px;
}

.end-screen .final-score {
  font-size: 60px;
  margin: 20px 0;
}

.hidden { display: none !important; }

.progress-bar {
  width: 100%;
  height: 10px;
  background: #eee;
  border-radius: 5px;
  margin: 15px 0;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 5px;
  transition: width 0.5s ease;
}

.emoji-hint {
  font-size: 50px;
  margin: 10px 0;
}

@media (max-width: 400px) {
  .hanzi-display { font-size: 90px; }
  .option-btn { font-size: 24px; padding: 15px 10px; }
  .header h1 { font-size: 24px; }
}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <h1>🌟 认字大冒险 🌟</h1>
  <p>小朋友，一起来认汉字吧！<br>点击正确的汉字，收集小星星 ✨</p>
  <button class="start-btn" onclick="startGame()">开始游戏 🎮</button>
</div>

<div class="end-screen hidden" id="endScreen">
  <h2>🎉 太棒了！</h2>
  <p>你完成了认字大冒险</p>
  <div class="final-score">⭐ <span id="finalScore">0</span></div>
  <p id="endMessage"></p>
  <button class="restart-btn" onclick="restartGame()">再玩一次 🚀</button>
</div>

<div class="celebration" id="celebration"></div>

<div class="game-container hidden" id="gameContainer">
  <div class="header">
    <h1>认字大冒险</h1>
  </div>
  
  <div class="score-bar">
    <span>⭐ <span id="score">0</span></span>
    <span>🏷️ <span id="round">1</span>/<span id="total">10</span></span>
  </div>
  
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
  
  <div class="emoji-hint" id="emojiHint"></div>
  
  <div class="hanzi-display" id="hanziDisplay"></div>
  
  <button class="voice-btn" onclick="speakCurrent()" title="点击听读音">🔊</button>
  
  <div class="hint-text" id="hintText"></div>
  
  <div class="options" id="options"></div>
</div>

  { char: "床", pinyin: "chuáng", emoji: "🛏", hint: "柔软的床" },
  { char: "桌", pinyin: "zhuō", emoji: "🪑", hint: "平坦的桌" },

  { char: "扇", pinyin: "shàn", emoji: "🪫", hint: "凉爽的扇" },
  { char: "刀", pinyin: "dāo", emoji: "🔪", hint: "锋利的刀" },

  { char: "森", pinyin: "sēn", emoji: "🌳", hint: "幽深的森" },
  { char: "河", pinyin: "hé", emoji: "🌊", hint: "奔流的河" },
  { char: "海", pinyin: "hǎi", emoji: "🌊", hint: "广阔的海" },

  { char: "沙", pinyin: "shā", emoji: "🏖️", hint: "细细的沙" },
  { char: "浪", pinyin: "làng", emoji: "🌊", hint: "翻滚的浪" },
  { char: "泉", pinyin: "quán", emoji: "⛲", hint: "清澈的泉" },
  { char: "石", pinyin: "shí", emoji: "🧱", hint: "坚硬的石" },
  { char: "峰", pinyin: "fēng", emoji: "⛰️", hint: "崖峡的峰" },
  { char: "坡", pinyin: "pō", emoji: "🌾", hint: "缓缓的坡" },
  { char: "坝", pinyin: "bà", emoji: "🚧", hint: "阻挡的坝" },
  { char: "坡", pinyin: "pō", emoji: "🌾", hint: "缓缓的坡" },
];

let currentRound = 0;
let score = 0;
let totalRounds = 10;
let currentQuestion = null;
let gameData = [];

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.85;
    utterance.pitch = 1.1;
    window.speechSynthesis.speak(utterance);
  }
}

function speakCurrent() {
  if (currentQuestion) {
    speak(currentQuestion.char);
  }
}

function createParticles() {
  const container = document.getElementById('celebration');
  const emojis = ['⭐', '🎉', '🎊', '✨', '💛', '🌟'];
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.top = '-50px';
    p.style.animationDelay = Math.random() * 0.5 + 's';
    p.style.animationDuration = (1.5 + Math.random()) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameContainer').classList.remove('hidden');
  
  score = 0;
  currentRound = 0;
  gameData = shuffle(hanziData).slice(0, totalRounds);
  
  updateScore();
  nextQuestion();
}

function restartGame() {
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('gameContainer').classList.remove('hidden');
  
  score = 0;
  currentRound = 0;
  gameData = shuffle(hanziData).slice(0, totalRounds);
  
  updateScore();
  nextQuestion();
}

function updateScore() {
  document.getElementById('score').textContent = score;
  document.getElementById('round').textContent = currentRound + 1;
  document.getElementById('total').textContent = totalRounds;
  const progress = ((currentRound) / totalRounds) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
}

function nextQuestion() {
  if (currentRound >= totalRounds) {
    showEndScreen();
    return;
  }
  
  currentQuestion = gameData[currentRound];
  
  // 显示汉字
  document.getElementById('hanziDisplay').textContent = currentQuestion.char;
  document.getElementById('emojiHint').textContent = currentQuestion.emoji;
  document.getElementById('hintText').textContent = '这是什么字？点击正确的答案！';
  
  // 生成选项：1个正确 + 3个干扰
  const others = hanziData.filter(h => h.char !== currentQuestion.char);
  const distractors = shuffle(others).slice(0, 3);
  const options = shuffle([currentQuestion, ...distractors]);
  
  const optionsContainer = document.getElementById('options');
  optionsContainer.innerHTML = '';
  
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.char;
    btn.onclick = () => checkAnswer(btn, opt.char);
    optionsContainer.appendChild(btn);
  });
  
  // 自动朗读
  setTimeout(() => speak(currentQuestion.char), 500);
}

function checkAnswer(btn, selectedChar) {
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);
  
  if (selectedChar === currentQuestion.char) {
    btn.classList.add('correct');
    score++;
    createParticles();
    speak('太棒了！答对了！');
    document.getElementById('hintText').textContent = '太棒了！这是「' + currentQuestion.char + '」，' + currentQuestion.hint + '！';
  } else {
    btn.classList.add('wrong');
    // 显示正确答案
    buttons.forEach(b => {
      if (b.textContent === currentQuestion.char) {
        b.classList.add('correct');
      }
    });
    speak('再试一次，正确答案是' + currentQuestion.char);
    document.getElementById('hintText').textContent = '不对哦，正确答案是「' + currentQuestion.char + '」，' + currentQuestion.hint + '！';
  }
  
  updateScore();
  
  setTimeout(() => {
    currentRound++;
    nextQuestion();
  }, 2500);
}

function showEndScreen() {
  document.getElementById('gameContainer').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = score + ' / ' + totalRounds;
  
  let msg = '';
  if (score === totalRounds) {
    msg = '🎉 太厉害了！全部答对！你是认字小能手！';
  } else if (score >= totalRounds * 0.8) {
    msg = '👏 非常棒！继续加油！';
  } else if (score >= totalRounds * 0.5) {
    msg = '👍 很不错！多练习几次就能全对啦！';
  } else {
    msg = '💪 加油啊！再来一次，你一定能行！';
  }
  document.getElementById('endMessage').textContent = msg;
  speak(msg);
}

// 预加载语音
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
}
</script>
</body>
